name: 'Tauri Build & Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Prevent duplicate release runs for the same ref.
# cancel-in-progress is false so a mid-flight release is never abandoned half-built.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ── 1. Create a draft GitHub release ─────────────────────────────────────────
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}

    steps:
      - uses: actions/checkout@v4

      - name: Read release versions
        run: |
          echo "APP_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const version = process.env.RELEASE_VERSION;
            const appVersion = process.env.APP_VERSION;
            const tagName = context.ref.replace('refs/tags/', '');
            const expectedTag = `v${version}`;
            if (tagName !== expectedTag) {
              throw new Error(`Release tag ${tagName} does not match release version ${expectedTag}`);
            }
            const isPrerelease = tagName.includes('-');
            const prereleaseLabel = tagName.includes('-alpha')
              ? 'Alpha'
              : tagName.includes('-beta')
                ? 'Beta'
                : 'Prerelease';
            const prereleaseWord = prereleaseLabel.toLowerCase();
            const body = [
              `## Odyssey v${version}`,
              '',
              `This ${prereleaseWord} focuses on stronger context retrieval, better lore lookup, and smoother campaign setup. Download the installer for your platform from the assets below.`,
              '',
              `Bundle version: ${appVersion}`,
              '',
              '### Highlights',
              '',
              '- Added vector RAG support for game memory, player/world state, adventure summaries, NPCs, locations, and retrieved lore.',
              '- Added configurable embedding providers for LM Studio, Ollama, OpenAI, and OpenAI-compatible endpoints, including model fetch and connection testing from Settings.',
              '- Improved Wikipedia and fandom wiki retrieval through MediaWiki APIs, with richer source excerpts and support for custom wiki metadata on created worlds.',
              '- Added optional Brave Search context for live web results when real-world lookup is enabled.',
              '- Added local persistence for game and universe vector stores through the Tauri bridge, with a curated universe vector-store publishing workflow.',
              '- Improved generation feedback with a rotating in-game loading state while Odyssey gathers context and writes the next turn.',
              '- Added generated save names during campaign creation so new adventures are easier to recognize in the load menu.',
              '',
              `### ${prereleaseLabel} Notes`,
              '',
              '- Vector RAG is opt-in from Settings and requires an embedding model before retrieval context is injected into turns.',
              '- Local embedding backends may require their server to be running before model fetch, embedding tests, or vector retrieval will succeed.',
              `- This ${prereleaseWord} prerelease may have rough edges around provider-specific embedding behavior and large universe-store workflows.`,
              '',
              '| Platform | Recommended asset |',
              '| --- | --- |',
              '| Windows | `Odyssey_' + appVersion + '_x64-setup.exe` or `Odyssey_' + appVersion + '_x64_en-US.msi` |',
              '| macOS (Apple Silicon) | `Odyssey_' + appVersion + '_aarch64.dmg` |',
              '| macOS (Intel) | `Odyssey_' + appVersion + '_x64.dmg` |',
              '| Linux | `odyssey_' + appVersion + '_amd64.deb` or `odyssey_' + appVersion + '_amd64.AppImage` |',
              '',
              'See the [README](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '#readme) for setup and usage.',
            ].join('\n');
            const releasePayload = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name:              tagName,
              name:                  isPrerelease ? `Odyssey v${version} ${prereleaseLabel}` : `Odyssey v${version}`,
              body,
              draft:                 true,
              prerelease:            isPrerelease,
              generate_release_notes: true,
            };
            let data;
            try {
              ({ data } = await github.rest.repos.createRelease(releasePayload));
            } catch (error) {
              if (error.status !== 422) throw error;
              ({ data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              }));
              ({ data } = await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: data.id,
                name: releasePayload.name,
                body: releasePayload.body,
                draft: true,
                prerelease: releasePayload.prerelease,
              }));
              const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: data.id,
                per_page: 100,
              });
              for (const asset of assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            }
            return data.id

  # ── 2. Build for every platform and upload artifacts to the draft release ────
  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false   # one platform failing must not cancel the others
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # Pre-install both macOS cross-compile targets on every macOS runner.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Tauri v2 Linux prerequisites (see https://v2.tauri.app/start/prerequisites/).
      # libasound2-dev is required by the `rodio` crate for audio playback.
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            libasound2-dev \
            build-essential \
            curl \
            wget \
            file \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and upload release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId:   ${{ needs.create-release.outputs.release_id }}
          projectPath: '.'
          args:        ${{ matrix.args }}

  # ── 3. Publish the release once every platform build succeeds ─────────────────
  publish-release:
    needs: [create-release, build-tauri]
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft:      false,
              prerelease: '${{ contains(github.ref_name, '-') }}' === 'true',
              make_latest: '${{ contains(github.ref_name, '-') }}' === 'true' ? 'false' : 'true',
            })
