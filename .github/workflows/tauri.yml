name: 'Tauri Build & Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Prevent duplicate release runs for the same ref.
# cancel-in-progress is false so a mid-flight release is never abandoned half-built.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ── 1. Create a draft GitHub release ─────────────────────────────────────────
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}

    steps:
      - uses: actions/checkout@v4

      - name: Read app version
        run: |
          echo "APP_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> "$GITHUB_ENV"

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v6
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name:   `v${process.env.APP_VERSION}`,
              name:       `Odyssey v${process.env.APP_VERSION}`,
              body:       'Download the installer for your platform below.',
              draft:      true,
              prerelease: false,
            })
            return data.id

  # ── 2. Build for every platform and upload artifacts to the draft release ────
  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false   # one platform failing must not cancel the others
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # Pre-install both macOS cross-compile targets on every macOS runner.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # libwebkit2gtk-4.1-dev (note: 4.1, not 4.0) is the Tauri v2 requirement.
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and upload release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId:   ${{ needs.create-release.outputs.release_id }}
          projectPath: '.'
          args:        ${{ matrix.args }}

  # ── 3. Publish the release once every platform build succeeds ─────────────────
  publish-release:
    needs: [create-release, build-tauri]
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Publish release
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft:      false,
              prerelease: false,
            })
