<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odyssey - Mobile Not Supported</title>
    <link rel="icon" type="image/x-icon" href="assets/odyssey.ico">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #a1a1aa;
            font-family: 'Merriweather', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            background: linear-gradient(to bottom, #02040a, #0b1021, #131d36);
        }
        .container {
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 3rem;
            max-width: 90%;
            width: 400px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        }
        h1 {
            font-family: 'Cinzel', serif;
            color: #ff4747;
            margin-top: 0;
            letter-spacing: 0.05em;
        }
        p {
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            font-family: 'Merriweather', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid #3f3f46;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background-color: transparent;
            color: #a1a1aa;
            text-decoration: none;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:hover {
            color: #ffffff;
            border-color: #a1a1aa;
            background-color: rgba(255, 255, 255, 0.05);
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fontId = 'google-fonts';
            if (!document.getElementById(fontId)) {
                const link = document.createElement('link');
                link.id = fontId;
                link.rel = 'stylesheet';
                link.href = `https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Merriweather:wght@400;600&display=swap`;
                document.head.appendChild(link);
            }
        });

        function bypassCheck() {
            localStorage.setItem('bypassMobileCheck', 'true');
            window.location.href = 'Welcome.html';
        }
    </script>
    <meta name="description" content="Odyssey - A text-based AI adventure game">
    <meta property="og:title" content="Odyssey">
    <meta property="og:description" content="A text-based AI adventure game">
    <meta property="og:type" content="website">
    <meta property="og:url" content="http://localhost:3000/">
    <meta property="og:image" content="http://localhost:3000/assets/favicon.ico">
    <meta name="theme-color" content="#121212">
</head>
<body>
    <div class="container">
        <h1>Device Not Supported</h1>
        <p>Odyssey requires a desktop or tablet browser to play.</p>
        <button class="btn" onclick="bypassCheck()">Continue Anyway</button>
    </div>
</body>
</html>
