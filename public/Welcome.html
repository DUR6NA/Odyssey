<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odyssey</title>
    <meta name="application-name" content="Odyssey">
    <meta name="description" content="Odyssey v0.6.1-alpha.1 - AI-driven text adventure desktop game with retrieval-enhanced lore and memory.">
    <meta name="theme-color" content="#121212">
    <meta name="odyssey-version" content="0.6.1-alpha.1">
    <meta name="odyssey-bundle-version" content="0.6.1-1">
    <meta property="og:title" content="Odyssey v0.6.1-alpha.1">
    <meta property="og:description" content="AI-driven text adventure desktop game with retrieval-enhanced lore and memory.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/x-icon" href="assets/odyssey.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jacquard+24&display=swap" rel="stylesheet">
    <script src="titlebar.js"></script>
    <script src="devtools.js"></script>
    <script src="ui-components.js"></script>
    <script>
        // Mobile bypass check — unchanged
        if (!localStorage.getItem('bypassMobileCheck')) {
            const isMobileAgent = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isNarrowViewport = window.innerWidth < 768;
            if (isMobileAgent || isNarrowViewport) {
                window.location.href = 'mobile-not-supported.html';
            }
        }
    </script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero {
            font-family: 'Jacquard 24', serif;
            font-size: 12rem;
            color: #ffffff;
            letter-spacing: 0.15em;
            text-shadow:
                0 0 20px rgba(255, 255, 255, 0.35),
                0 0 60px rgba(255, 255, 255, 0.15);
            opacity: 0;
            transform: scale(0.92);
            animation: heroIn 2.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            user-select: none;
            white-space: nowrap;
        }

        @keyframes heroIn {
            0%   { opacity: 0; transform: scale(0.92); }
            25%  { opacity: 1; transform: scale(1); }
            75%  { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.02); }
        }

        .fade {
            position: fixed;
            inset: 0;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .fade.on {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="hero">DUR6NA</div>
    <div class="fade" id="fade"></div>

    <script>
        // After the hero animation completes, fade to black and go to the main menu.
        const TOTAL_MS = 2400;
        const FADE_LEAD_MS = 400;

        setTimeout(() => {
            document.getElementById('fade').classList.add('on');
        }, TOTAL_MS - FADE_LEAD_MS);

        setTimeout(() => {
            window.location.href = 'mainmenu.html';
        }, TOTAL_MS);

        // Allow skipping the hero with any key/click.
        const skip = () => { window.location.href = 'mainmenu.html'; };
        document.addEventListener('click', skip, { once: true });
        document.addEventListener('keydown', skip, { once: true });
    </script>
</body>

</html>
