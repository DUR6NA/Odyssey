<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odyssey - Main Menu</title>
    <link rel="icon" type="image/x-icon" href="assets/odyssey.ico">
    <script src="theme.js"></script>
    <script src="tauri-bridge.js"></script>
    <script src="titlebar.js"></script>
    <script src="menu-music.js"></script>
    <script>
        function startNewGame() {
            window.location.href = 'game.html?action=new';
        }

        function formatSaveLabel(game) {
            return /^\d+$/.test(String(game)) ? `Save ${game}` : String(game);
        }

        async function loadGameMenu() {
            document.getElementById('menu-buttons').classList.add('hidden');
            const container = document.getElementById('save-list-container');
            container.classList.remove('hidden');

            const list = document.getElementById('save-list');
            list.innerHTML = '<p style="color:var(--text-muted);">Loading saves...</p>';

            try {
                // Wait for the async Tauri bridge initialization to complete
                await (window.tauriBridgeReady || Promise.resolve());

                let games = [];
                if (window.tauriBridge) {
                    games = await window.tauriBridge.listGames();
                } else {
                    const res = await fetch('/api/list-games');
                    games = await res.json();
                }

                list.innerHTML = '';
                if (games.length === 0) {
                    list.innerHTML = '<p style="color:var(--text-muted);">No saved games found.</p>';
                    return;
                }

                games.forEach(game => {
                    const row = document.createElement('div');
                    row.style.display = 'flex';
                    row.style.alignItems = 'center';
                    row.style.justifyContent = 'space-between';
                    row.style.width = '100%';
                    row.style.gap = '15px';

                    const btn = document.createElement('button');
                    btn.className = 'menu-btn save-btn';
                    btn.style.fontSize = '1.2rem';
                    btn.textContent = formatSaveLabel(game);
                    btn.onclick = () => {
                        window.location.href = `game.html?action=load&id=${encodeURIComponent(game)}`;
                    };

                    
                    const dlBtn = document.createElement('button');
                    dlBtn.className = 'menu-btn save-btn';
                    dlBtn.style.fontSize = '1.2rem';
                    dlBtn.textContent = '📥';
                    dlBtn.title = 'Export Save';
                    dlBtn.onclick = async (e) => {
                        e.stopPropagation();
                        if (window.tauriBridge) {
                            const result = await window.tauriBridge.exportGame(game);
                            if (result.success) {
                                alert('Game exported successfully!');
                            } else {
                                alert('Export failed.');
                            }
                        } else {
                            window.location.href = '/api/export-game?id=' + encodeURIComponent(game);
                        }
                    };
                    const delBtn = document.createElement('button');
                    delBtn.className = 'menu-btn save-btn';
                    delBtn.style.fontSize = '1.2rem';
                    delBtn.style.color = 'var(--color-danger, #ef4444)';
                    delBtn.textContent = '🗑️';
                    delBtn.title = 'Delete Save';
                    delBtn.onclick = async (e) => {
                        e.stopPropagation();
                        if (confirm(`Are you sure you want to delete ${formatSaveLabel(game)}? This cannot be undone.`)) {
                            try {
                                let success = false;
                                if (window.tauriBridge) {
                                    const result = await window.tauriBridge.deleteGame(game);
                                    success = result.success;
                                } else {
                                    const delRes = await fetch('/api/delete-game', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ id: game })
                                    });
                                    success = delRes.ok;
                                }
                                if (success) {
                                    loadGameMenu(); // Refresh list
                                } else {
                                    alert('Failed to delete save.');
                                }
                            } catch (err) {
                                console.error(err);
                                alert('Error deleting save.');
                            }
                        }
                    };

                    const actionWrapper = document.createElement('div');
                    actionWrapper.style.display = 'flex';
                    actionWrapper.style.gap = '10px';
                    actionWrapper.appendChild(dlBtn);
                    actionWrapper.appendChild(delBtn);

                    row.appendChild(btn);
                    row.appendChild(actionWrapper);
                    list.appendChild(row);
                });
            } catch (e) {
                console.error(e);
                list.innerHTML = '<p style="color:var(--color-danger, #ef4444);">Error loading save data</p>';
            }
        }


        async function triggerImport() {
            await (window.tauriBridgeReady || Promise.resolve());
            // Use the browser's FileReader to read the file — no fs scope issues.
            // Only the write step goes through the Tauri bridge (writing to app data dir).
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = async e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const importData = JSON.parse(event.target.result);
                        if (window.tauriBridge) {
                            const result = await window.tauriBridge.importGameData(importData);
                            if (result.success) {
                                loadGameMenu();
                                alert('Save imported successfully!');
                            } else {
                                alert('Failed to import save: ' + (result.error || 'unknown error'));
                            }
                        } else {
                            const res = await fetch('/api/import-game', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(importData)
                            });
                            if (res.ok) {
                                loadGameMenu();
                                alert('Save imported successfully!');
                            } else {
                                alert('Failed to import save.');
                            }
                        }
                    } catch (err) {
                        alert('Error importing save: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        function hideLoadMenu() {
            document.getElementById('save-list-container').classList.add('hidden');
            document.getElementById('menu-buttons').classList.remove('hidden');
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main, #000);
            color: var(--text-heading, white);
            overflow: hidden;
            font-family: var(--font-secondary, 'Merriweather', sans-serif);
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Background Container — colors from theme variables */
        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, var(--menu-bg-top), var(--menu-bg-mid), var(--menu-bg-bottom));
            overflow: hidden;
            z-index: 1;
        }

        /* Stars — use currentColor so color is inherited from theme */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background-image:
                radial-gradient(1px 1px at 20px 30px, var(--menu-btn-hover, #fff), transparent),
                radial-gradient(1px 1px at 140px 70px, var(--menu-btn-hover, #fff), transparent),
                radial-gradient(2px 2px at 90px 40px, var(--menu-btn-hover, #fff), transparent),
                radial-gradient(1.5px 1.5px at 260px 120px, var(--menu-btn-hover, #fff), transparent),
                radial-gradient(1px 1px at 350px 20px, var(--menu-btn-hover, #fff), transparent),
                radial-gradient(2.5px 2.5px at 450px 160px, var(--menu-btn-hover, #fff), transparent),
                radial-gradient(1px 1px at 550px 300px, var(--menu-btn-hover, #fff), transparent),
                radial-gradient(1.5px 1.5px at 650px 50px, var(--menu-btn-hover, #fff), transparent),
                radial-gradient(2px 2px at 750px 250px, var(--menu-btn-hover, #fff), transparent),
                radial-gradient(1px 1px at 80px 350px, var(--menu-btn-hover, #fff), transparent);
            background-repeat: repeat;
            background-size: 800px 800px;
            opacity: 0.5;
            animation: twinkle 4s ease-in-out infinite alternate, star-drift 60s linear infinite;
        }

        /* Hide stars for themes that don't want them */
        .stars.theme-hidden,
        .shooting-star.theme-hidden,
        .lightning.theme-hidden {
            display: none !important;
        }

        @keyframes star-drift {
            from { background-position: 0 0; }
            to { background-position: -800px 0; }
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }

        .moon {
            position: absolute;
            top: 15%;
            right: 25%;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--menu-moon-bg);
            box-shadow: 0 0 60px 20px var(--menu-moon-glow), inset -10px -10px 20px var(--menu-moon-inset);
            animation: moon-drift 30s linear forwards;
            z-index: 0;
        }

        @keyframes moon-drift {
            from { transform: translateX(0); }
            to { transform: translateX(-150px); }
        }

        .shooting-star {
            position: absolute;
            width: 150px;
            height: 2px;
            background: linear-gradient(to right, var(--menu-btn-hover, rgba(255,255,255,1)), transparent);
            transform: rotate(-35deg) scale(0);
            transform-origin: right;
            opacity: 0;
            z-index: 5;
        }

        .shooting-star.primary {
            top: 5%;
            right: 15%;
            animation: shooting 7s linear infinite;
        }

        .shooting-star.secondary {
            top: 25%;
            right: 45%;
            animation: shooting 11s linear infinite;
            animation-delay: 4s;
        }

        @keyframes shooting {
            0% { transform: rotate(-35deg) translateX(0) scale(0); opacity: 0; }
            5% { transform: rotate(-35deg) translateX(-100px) scale(1); opacity: 1; }
            15% { transform: rotate(-35deg) translateX(-400px) scale(0); opacity: 0; }
            100% { opacity: 0; }
        }

        .lightning {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--menu-btn-hover, white);
            opacity: 0;
            pointer-events: none;
            animation: flash 9s infinite;
            z-index: 0;
        }

        @keyframes flash {
            0%, 93%, 98%, 100% { opacity: 0; }
            94% { opacity: 0.5; }
            95% { opacity: 0; }
            99% { opacity: 0.8; }
        }

        .parallax-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-repeat: repeat-x;
        }

        .layer-1 {
            bottom: 0;
            height: 18vh;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" preserveAspectRatio="none"><path fill="%23060a12" d="M0,15 Q100,0 200,15 T400,15 L400,100 L0,100 Z"/></svg>');
            background-size: 600px 100%;
            animation: scroll-waves-1 5s linear infinite;
            z-index: 3;
        }

        .layer-2 {
            bottom: 0;
            height: 30vh;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" preserveAspectRatio="none"><path fill="%2311182c" d="M0,20 Q75,5 150,20 T300,20 L300,100 L0,100 Z"/></svg>');
            background-size: 400px 100%;
            animation: scroll-waves-2 9s linear infinite;
            z-index: 2;
        }

        .layer-3 {
            bottom: 0;
            height: 40vh;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" preserveAspectRatio="none"><path fill="%231a233b" d="M0,5 Q50,0 100,5 T200,5 L200,100 L0,100 Z"/></svg>');
            background-size: 250px 100%;
            animation: scroll-waves-3 15s linear infinite;
            z-index: 1;
        }

        @keyframes scroll-waves-1 {
            from { background-position: 0 bottom; }
            to { background-position: -600px bottom; }
        }

        @keyframes scroll-waves-2 {
            from { background-position: 0 bottom; }
            to { background-position: -400px bottom; }
        }

        @keyframes scroll-waves-3 {
            from { background-position: 0 bottom; }
            to { background-position: -250px bottom; }
        }

        /* Menu Content Over Background */
        .menu-content {
            position: absolute;
            top: 60px;
            left: 80px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .main-title {
            font-family: var(--font-primary, 'Cinzel', serif);
            font-size: 6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--menu-title-color);
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            margin: 0 0 50px 0;
            user-select: none;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 25px;
        }

        .menu-btn {
            background: transparent;
            border: none;
            color: var(--menu-btn-color);
            font-family: var(--font-secondary, 'Merriweather', sans-serif);
            font-size: 1.8rem;
            cursor: pointer;
            padding: 5px 0;
            transition: color 0.3s ease, transform 0.3s ease, text-shadow 0.3s ease;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            outline: none;
        }

        .menu-btn:not(.save-btn):hover {
            color: var(--menu-btn-hover);
            transform: translateX(15px);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6), 0 2px 10px rgba(0, 0, 0, 0.9);
        }

        .save-btn {
            background: var(--save-btn-bg, transparent);
            border: var(--save-btn-border, none);
            color: var(--save-btn-text, var(--menu-btn-color));
            box-shadow: var(--save-btn-shadow, none);
            border-radius: var(--save-btn-radius, 0);
            padding: var(--save-btn-padding, 5px 0);
            text-shadow: var(--save-btn-text-shadow, 0 2px 10px rgba(0, 0, 0, 0.9));
            transition: all 0.3s ease;
        }

        .save-btn:hover {
            background: var(--save-btn-bg-hover, transparent);
            border: var(--save-btn-border-hover, var(--save-btn-border, none));
            color: var(--save-btn-text-hover, var(--menu-btn-hover));
            box-shadow: var(--save-btn-shadow-hover, none);
            text-shadow: var(--save-btn-text-shadow-hover, 0 0 15px rgba(255, 255, 255, 0.6), 0 2px 10px rgba(0, 0, 0, 0.9));
            transform: var(--save-btn-transform-hover, translateY(0));
        }

        .hidden {
            display: none !important;
        }

        #save-list-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            background: var(--save-panel-bg, rgba(10, 15, 25, 0.75));
            backdrop-filter: blur(12px);
            padding: 30px 40px;
            border-radius: var(--save-panel-radius, 16px);
            border: var(--save-panel-border, 1px solid rgba(255, 255, 255, 0.08));
            box-shadow: var(--save-panel-shadow, 0 15px 40px rgba(0, 0, 0, 0.6));
            min-width: 300px;
            transition: all 0.3s ease;
        }

        .save-title {
            font-family: var(--font-primary, 'Cinzel', serif);
            font-size: 1.6rem;
            margin: 0 0 25px 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            letter-spacing: 0.05em;
            color: var(--accent-color, #e2e8f0);
            text-transform: uppercase;
        }

        .save-list {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
            max-height: 50vh;
            overflow-y: auto;
            margin-bottom: 30px;
            padding-right: 15px;
            width: 100%;
        }

        /* .save-list scrollbar inherits from global scrollbar in style.css */

        .back-btn {
            font-size: 1.2rem;
            color: var(--text-muted, #9ca3af);
        }

        .back-btn:hover {
            color: var(--menu-btn-hover);
            transform: translateX(5px);
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeId = localStorage.getItem('jsonAdventure_activeThemeId') || 'dark';
            const theme = (typeof presetThemes !== 'undefined') ? presetThemes[themeId] : null;
            if (!theme) return;

            const wave1Color = theme.vars['--menu-wave1'] || '#060a12';
            const wave2Color = theme.vars['--menu-wave2'] || '#11182c';
            const wave3Color = theme.vars['--menu-wave3'] || '#1a233b';

            const layer1 = document.querySelector('.layer-1');
            const layer2 = document.querySelector('.layer-2');
            const layer3 = document.querySelector('.layer-3');

            if (layer1) layer1.style.backgroundImage = `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" preserveAspectRatio="none"><path fill="${encodeURIComponent(wave1Color)}" d="M0,15 Q100,0 200,15 T400,15 L400,100 L0,100 Z"/></svg>')`;
            if (layer2) layer2.style.backgroundImage = `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" preserveAspectRatio="none"><path fill="${encodeURIComponent(wave2Color)}" d="M0,20 Q75,5 150,20 T300,20 L300,100 L0,100 Z"/></svg>')`;
            if (layer3) layer3.style.backgroundImage = `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" preserveAspectRatio="none"><path fill="${encodeURIComponent(wave3Color)}" d="M0,5 Q50,0 100,5 T200,5 L200,100 L0,100 Z"/></svg>')`;

            // Hide stars/lightning for themes that don't want them
            const showStars = theme.vars['--menu-show-stars'] || '1';
            const showLightning = theme.vars['--menu-show-lightning'] || '1';

            if (showStars === '0') {
                document.querySelector('.stars')?.classList.add('theme-hidden');
                document.querySelectorAll('.shooting-star').forEach(el => el.classList.add('theme-hidden'));
            }
            if (showLightning === '0') {
                document.querySelector('.lightning')?.classList.add('theme-hidden');
            }
        });
    </script>
    <meta name="description" content="Odyssey - A text-based AI adventure game">
    <meta name="theme-color" content="#121212">
</head>

<body>

    <div class="background-container">
        <div class="stars"></div>
        <div class="shooting-star primary"></div>
        <div class="shooting-star secondary"></div>
        <div class="moon"></div>
        <div class="lightning"></div>
        <div class="parallax-layer layer-1"></div>
        <div class="parallax-layer layer-2"></div>
        <div class="parallax-layer layer-3"></div>
    </div>

    <div class="menu-content" id="menu-content">
        <h1 class="main-title">Odyssey</h1>
        <div class="menu-buttons" id="menu-buttons">
            <button class="menu-btn" onclick="startNewGame()">New Game</button>
            <button class="menu-btn" onclick="loadGameMenu()">Load Game</button>
            <button class="menu-btn" onclick="window.location.href='settings.html?from=mainmenu'">Settings</button>
            <button class="menu-btn" onclick="window.location.href='presets.html'">Presets</button>
            <button class="menu-btn" onclick="window.location.href='infowiki.html'">Info</button>
        </div>
        <div id="save-list-container" class="hidden">
            <h2 class="save-title">Select Save</h2>
            <div id="save-list" class="save-list"></div>
            <div style="width: 100%; border-top: 1px solid var(--border-color, rgba(255, 255, 255, 0.1)); padding-top: var(--space-md, 15px); margin-top: var(--space-sm, 10px); display: flex; justify-content: space-between; align-items: center;">
                <button class="menu-btn back-btn" onclick="triggerImport()" style="opacity: 0.8; font-size: 1rem;">📥 Import Save</button>
                <button class="menu-btn back-btn" onclick="hideLoadMenu()">Back</button>
            </div>
        </div>
    </div>

</body>

</html>
